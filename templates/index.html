{% extends "base.html" %}

{% block title %}Punchclock | Select job{% endblock %}

{% block page %}
<h3>Select a job:</h3>
{% for job in jobs %}
<div class="row"><h3><a href="/job/{{ job.job_id }}/punchclock">{{ job.job_name }}</a></h3>   |   <a style="font-size: 14" href="/delete_job/{{ job.job_id }}">Delete</a></div>
{% endfor %}
<p>----</p>
<h4><a href="/add_job">Add new job</a></h4>
<h4><a href="/deleted_jobs">View deleted jobs</a></h4>
{% endblock %}
