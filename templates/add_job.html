{% extends "base.html" %}

{% block title %}Punchclock | Add job{% endblock %}

{% block page %}
<form method="POST" action="/add_job_submit">
  <input
    type="textentry"
    id="job_name"
    name="job_name"
    value=""
    placeholder="Job name"
    >
  </input>
  <label for="job_name">Job name</label>
  <input
    type="number"
    id="init_pay_rate"
    name="init_pay_rate"
    placeholder="0.00"
    step="0.01"
    >
  </input>
  <label for="init_pay_rate">Initial hourly rate</label>
  <input
    type="submit"
    <!-- value="submit" -->
    </input>
</form>
{% endblock %}
